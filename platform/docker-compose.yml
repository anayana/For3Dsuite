name: pano3d

services:
  garage:
    image: dxflrs/garage:v1.0.1
    restart: unless-stopped
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data

  app:
    build:
      context: ..
      dockerfile: platform/app/Dockerfile
    restart: unless-stopped
    environment:
      STORAGE: s3
      S3_ENDPOINT: http://garage:3900
      S3_REGION: garage
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_MEDIA: media
      S3_BUCKET_ORIGINALS: originals
      DATA_DIR: /data
    volumes:
      - app-data:/data
    depends_on:
      - garage

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      STUDIO_USER: ${STUDIO_USER}
      STUDIO_HASH: ${STUDIO_HASH}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
      - garage

volumes:
  garage-meta:
  garage-data:
  app-data:
  caddy-data:
  caddy-config:
