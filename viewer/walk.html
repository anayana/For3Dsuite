<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Renon — Standpunkt-Rundumblick (Layer 1 + 2)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0d10;
                 font-family: system-ui, -apple-system, sans-serif; color: #eee; }
    #app { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
    #app.drag { cursor: grabbing; }

    #hud { position: absolute; top: 14px; left: 14px; z-index: 10; font-size: 12px;
           color: #cdd3da; background: rgba(0,0,0,0.45); padding: 8px 12px; border-radius: 10px;
           border: 1px solid rgba(255,255,255,0.1); pointer-events: none; max-width: 340px; }
    #hud b { color: #fff; }
    #hud .hint { color: #9ecbff; }

    #panel { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
             z-index: 10; display: flex; gap: 16px; align-items: center; font-size: 12px;
             background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); padding: 8px 16px;
             border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); }
    #panel label { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
    #panel input[type=range] { width: 100px; }
    #panel button { border: 0; border-radius: 999px; padding: 6px 13px; cursor: pointer;
                    background: #ffffff22; color: #eee; font-size: 12px; }
    #panel button:hover { background: #ffffff33; }

    #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
              z-index: 20; color: #9ecbff; font-size: 14px; }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="status">Lade Panorama + Punktwolke …</div>

  <div id="hud">
    <b>Renon / ICOS IT-Ren</b> — ein Scan-Standpunkt · Layer 1 (Foto-Panorama) + Layer 2 (LiDAR)<br />
    <span class="hint">Maustaste gedrückt halten und ziehen = umsehen · Mausrad = vor/zurück · WASD = bewegen</span><br />
    Position <span id="pos">0.0, 0.0, 0.0</span> m
  </div>

  <div id="panel">
    <label>Punktgröße <input id="size" type="range" min="1" max="60" value="18" /></label>
    <label>Panorama-Yaw <input id="yaw" type="range" min="-180" max="180" value="0" /><span id="yawv">0°</span></label>
    <label><input id="tpts" type="checkbox" checked /> Punkte</label>
    <label><input id="tpano" type="checkbox" checked /> Panorama</label>
    <button id="reset">Zurück zum Ursprung</button>
  </div>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, 1, 0.02, 4000);
    camera.rotation.order = 'YXZ';
    camera.position.set(0, 0, 0);          // Scan-Ursprung = Aufnahmezentrum des Panoramas

    // --- Skybox: Panorama per Shader mit der inversen Reprojektions-Mathematik ---
    // Exporter mappt E57(x,y,z) -> three(x, z, -y). Inverse fuer die Blickrichtung d (three):
    //   E57_x = d.x,  E57_y = -d.z,  E57_z = d.y  -> lon = atan2(E57_y,E57_x), lat = asin(E57_z)
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide, depthWrite: false,
      uniforms: { pano: { value: null }, uYaw: { value: 0 } },
      vertexShader: `
        varying vec3 vDir;
        void main(){ vDir = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `
        precision highp float;
        varying vec3 vDir; uniform sampler2D pano; uniform float uYaw;
        #define PI 3.141592653589793
        void main(){
          vec3 d = normalize(vDir);
          float ex = d.x, ey = -d.z, ez = d.y;
          float lon = atan(ey, ex) + uYaw;
          float lat = asin(clamp(ez, -1.0, 1.0));
          float u = fract((lon + PI) / (2.0*PI));
          float v = (lat + 0.5*PI) / PI;
          gl_FragColor = texture2D(pano, vec2(u, v));
        }`
    });
    const sky = new THREE.Mesh(new THREE.SphereGeometry(800, 48, 32), skyMat);
    sky.renderOrder = -1;
    scene.add(sky);

    // --- Punktwolke ---
    const material = new THREE.PointsMaterial({ size: 0.018, vertexColors: true, sizeAttenuation: true });
    let points = null;

    // --- Steuerung: Umsehen NUR bei gedrueckter Maustaste (Drag), plus WASD/Rad ---
    let yaw = 0, pitch = 0;
    let dragging = false, lastX = 0, lastY = 0;
    const LOOK = 0.0026;

    canvas.addEventListener('pointerdown', e => {
      dragging = true; lastX = e.clientX; lastY = e.clientY;
      canvas.classList.add('drag'); canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', e => {
      if (!dragging) return;
      yaw   -= (e.clientX - lastX) * LOOK;
      pitch -= (e.clientY - lastY) * LOOK;
      pitch = Math.max(-1.55, Math.min(1.55, pitch));
      lastX = e.clientX; lastY = e.clientY;
    });
    function endDrag(e) { dragging = false; canvas.classList.remove('drag');
      try { canvas.releasePointerCapture(e.pointerId); } catch (_) {} }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    // Mausrad = vor/zurueck in Blickrichtung
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
      camera.position.addScaledVector(dir, -Math.sign(e.deltaY) * 0.8);
    }, { passive: false });

    const key = {};
    addEventListener('keydown', e => { key[e.code] = true; });
    addEventListener('keyup',   e => { key[e.code] = false; });

    function resize() {
      const w = canvas.clientWidth || innerWidth, h = canvas.clientHeight || innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    addEventListener('resize', resize);

    // UI
    document.getElementById('size').addEventListener('input', e => material.size = e.target.value / 1000);
    document.getElementById('yaw').addEventListener('input', e => {
      skyMat.uniforms.uYaw.value = e.target.value * Math.PI / 180;
      document.getElementById('yawv').textContent = e.target.value + '°';
    });
    document.getElementById('tpts').addEventListener('change', e => { if (points) points.visible = e.target.checked; });
    document.getElementById('tpano').addEventListener('change', e => sky.visible = e.target.checked);
    document.getElementById('reset').addEventListener('click', () => {
      camera.position.set(0, 0, 0); yaw = 0; pitch = 0;
    });

    const posEl = document.getElementById('pos');
    const _dir = new THREE.Vector3(), _right = new THREE.Vector3();
    let last = performance.now();
    function tick() {
      const now = performance.now(), dt = Math.min(0.05, (now - last) / 1000); last = now;

      // WASD-Bewegung relativ zur Blickrichtung
      const sp = (key['ShiftLeft'] || key['ShiftRight'] ? 22 : 7) * dt;
      camera.getWorldDirection(_dir);
      _right.crossVectors(_dir, camera.up).normalize();
      if (key['KeyW']) camera.position.addScaledVector(_dir, sp);
      if (key['KeyS']) camera.position.addScaledVector(_dir, -sp);
      if (key['KeyD']) camera.position.addScaledVector(_right, sp);
      if (key['KeyA']) camera.position.addScaledVector(_right, -sp);
      if (key['Space'])       camera.position.y += sp;
      if (key['ControlLeft']) camera.position.y -= sp;

      camera.rotation.set(pitch, yaw, 0);      // YXZ
      const p = camera.position;
      posEl.textContent = `${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;

      sky.position.copy(camera.position);      // Skybox folgt der Kamera (unendlich weit)
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    async function load() {
      const status = document.getElementById('status');
      try {
        const loader = new THREE.TextureLoader();
        const [tex, buf] = await Promise.all([
          new Promise((res, rej) => loader.load('../output/renon_setup01/pano_equirect.jpg', res, undefined, rej)),
          fetch('./data/renon_setup01_points.bin').then(r => r.arrayBuffer())
        ]);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.wrapS = THREE.RepeatWrapping;
        skyMat.uniforms.pano.value = tex;

        const dv = new DataView(buf);
        const magic = String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2), dv.getUint8(3));
        if (magic !== 'PCB1') throw new Error('Punkt-Binär: falsches Format ' + magic);
        const n = dv.getUint32(4, true);
        const positions = new Float32Array(buf, 8, n * 3);
        const cU8 = new Uint8Array(buf, 8 + n * 12, n * 3);
        const colors = new Float32Array(n * 3);
        for (let i = 0; i < colors.length; i++) colors[i] = cU8[i] / 255;
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geo.computeBoundingSphere();
        points = new THREE.Points(geo, material);
        scene.add(points);

        status.remove();
        window.__three = { THREE, scene, camera, renderer, points, sky, skyMat,
                           look: () => ({ yaw, pitch }), setLook: (y, p) => { yaw = y; pitch = p; } };
        window.__ready = { n };
      } catch (e) {
        status.textContent = 'Fehler: ' + e.message; status.style.color = '#ff8080';
        window.__ready = { error: e.message };
      }
    }

    resize(); load(); tick();
  </script>
</body>
</html>
