<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Renon — begehbare Tour (mehrere Standpunkte)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0d10;
                 font-family: system-ui, -apple-system, sans-serif; color: #eee; }
    #app { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
    #app.drag { cursor: grabbing; }

    #hud { position: absolute; top: 14px; left: 14px; z-index: 10; font-size: 12px;
           color: #cdd3da; background: rgba(0,0,0,0.45); padding: 8px 12px; border-radius: 10px;
           border: 1px solid rgba(255,255,255,0.1); pointer-events: none; max-width: 360px; }
    #hud b { color: #fff; } #hud .hint { color: #9ecbff; }

    #panel { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
             z-index: 10; display: flex; gap: 14px; align-items: center; font-size: 12px;
             background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); padding: 8px 16px;
             border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); }
    #panel label { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
    #panel input[type=range] { width: 90px; }
    #nodes { display: flex; gap: 6px; }
    #nodes button { border: 0; border-radius: 999px; padding: 6px 12px; cursor: pointer;
                    background: #ffffff22; color: #eee; font-size: 12px; }
    #nodes button.active { background: #fff; color: #111; font-weight: 600; }
    #nodes button:hover { background: #ffffff44; }

    #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
              z-index: 20; color: #9ecbff; font-size: 14px; }

    /* Bestandeswerte-Panel (rechts oben) */
    #stand { position: absolute; top: 14px; right: 14px; z-index: 10; width: 288px;
             max-height: calc(100% - 28px); overflow-y: auto; font-size: 12px;
             background: rgba(10,13,17,0.82); backdrop-filter: blur(8px); color: #dfe6ee;
             border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 12px 14px; }
    #stand h3 { margin: 0 0 2px; font-size: 13.5px; color: #fff; }
    #stand .sub { color: #8b97a5; font-size: 11px; margin-bottom: 8px; }
    #stand table { width: 100%; border-collapse: collapse; }
    #stand td { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
                vertical-align: baseline; }
    #stand td:first-child { color: #9aa6b2; padding-right: 8px; }
    #stand td:last-child { text-align: right; color: #fff; font-variant-numeric: tabular-nums;
                white-space: nowrap; }
    #stand .grp { color: #7ee787; font-size: 10.5px; text-transform: uppercase;
                letter-spacing: .5px; padding-top: 9px; }
    #stand .qual { color: #cbd3db; font-size: 11px; line-height: 1.45; margin-top: 3px; }
    #hist { display: flex; align-items: flex-end; gap: 3px; height: 46px; margin: 6px 0 2px; }
    #hist .bar { flex: 1; background: linear-gradient(#7ee787, #2ea3ff); border-radius: 2px 2px 0 0;
                min-height: 2px; position: relative; }
    #hist .bar span { position: absolute; bottom: -14px; left: 0; right: 0; text-align: center;
                font-size: 8.5px; color: #8b97a5; }
    #stand .foot { color: #6c7683; font-size: 9.5px; margin-top: 12px; line-height: 1.4; }

    /* Baum-Info-Popup */
    #treeinfo { position: absolute; z-index: 12; display: none; min-width: 150px;
                background: rgba(10,13,17,0.92); color: #eef3f8; font-size: 12px;
                border: 1px solid #2ea3ff88; border-radius: 10px; padding: 9px 11px;
                pointer-events: none; box-shadow: 0 4px 18px rgba(0,0,0,0.5); }
    #treeinfo b { color: #7ee787; } #treeinfo table td { padding: 1px 0; }
    #treeinfo td:first-child { color: #9aa6b2; padding-right: 10px; }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="status">Lade Tour …</div>

  <div id="hud">
    <b>Renon / ICOS IT-Ren</b> — begehbare Tour · Layer 1 + 2<br />
    <span class="hint">Ziehen = umsehen · WASD = gehen · Mausrad = vor/zurück · Marker/Zahlen = zum Standpunkt springen</span><br />
    Standpunkt <span id="curnode">–</span> · Position <span id="pos">0,0,0</span> m
  </div>

  <div id="panel">
    <label>Punktgröße <input id="size" type="range" min="1" max="60" value="16" /></label>
    <label><input id="tpts" type="checkbox" checked /> Punkte</label>
    <label><input id="tpano" type="checkbox" checked /> Panorama</label>
    <label><input id="ttrees" type="checkbox" checked /> Bäume</label>
    <span id="nodes"></span>
  </div>

  <div id="stand"></div>
  <div id="treeinfo"></div>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, 1, 0.02, 5000);
    camera.rotation.order = 'YXZ';

    // Skybox (Panorama des aktiven Standpunkts), Shader = inverse Reprojektion
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide, depthWrite: false,
      uniforms: { pano: { value: null }, uYaw: { value: 0 } },
      vertexShader: `varying vec3 vDir;
        void main(){ vDir = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `precision highp float; varying vec3 vDir;
        uniform sampler2D pano; uniform float uYaw; #define PI 3.141592653589793
        void main(){ vec3 d = normalize(vDir);
          float ex=d.x, ey=-d.z, ez=d.y;
          float lon=atan(ey,ex)+uYaw, lat=asin(clamp(ez,-1.0,1.0));
          gl_FragColor = texture2D(pano, vec2(fract((lon+PI)/(2.0*PI)), (lat+0.5*PI)/PI)); }`
    });
    const sky = new THREE.Mesh(new THREE.SphereGeometry(800, 48, 32), skyMat);
    sky.renderOrder = -1; scene.add(sky);

    const material = new THREE.PointsMaterial({ size: 0.016, vertexColors: true, sizeAttenuation: true });
    const markerGroup = new THREE.Group(); scene.add(markerGroup);
    const treeGroup = new THREE.Group(); scene.add(treeGroup);   // Baum-Marker (Inventur)

    // --- Drag-Look + WASD (Ansicht bewegt sich NUR bei gedrueckter Maustaste) ---
    let yaw = 0, pitch = 0, dragging = false, lastX = 0, lastY = 0;
    const LOOK = 0.0026;
    canvas.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY;
      canvas.classList.add('drag'); try { canvas.setPointerCapture(e.pointerId); } catch(_){} });
    canvas.addEventListener('pointermove', e => { if (!dragging) return;
      yaw -= (e.clientX-lastX)*LOOK; pitch -= (e.clientY-lastY)*LOOK;
      pitch = Math.max(-1.55, Math.min(1.55, pitch)); lastX = e.clientX; lastY = e.clientY; });
    const endDrag = e => { dragging = false; canvas.classList.remove('drag');
      try { canvas.releasePointerCapture(e.pointerId); } catch(_){} };
    canvas.addEventListener('pointerup', endDrag); canvas.addEventListener('pointercancel', endDrag);
    canvas.addEventListener('wheel', e => { e.preventDefault();
      const d = new THREE.Vector3(); camera.getWorldDirection(d);
      camera.position.addScaledVector(d, -Math.sign(e.deltaY)*0.9); }, { passive:false });
    const key = {}; addEventListener('keydown', e => { key[e.code] = true;
      if (e.code.startsWith('Digit')) { const i = +e.code.slice(5)-1; if (nodes[i]) goTo(i); } });
    addEventListener('keyup', e => { key[e.code] = false; });

    // Klick auf Marker -> zum Standpunkt
    const ray = new THREE.Raycaster(); const mouse = new THREE.Vector2();
    let downXY = null;
    canvas.addEventListener('pointerdown', e => downXY = [e.clientX, e.clientY]);
    canvas.addEventListener('pointerup', e => {
      if (!downXY) return;
      const moved = Math.abs(e.clientX-downXY[0]) + Math.abs(e.clientY-downXY[1]);
      downXY = null;
      if (moved > 6) return;                       // war ein Drag, kein Klick
      mouse.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
      ray.setFromCamera(mouse, camera);
      // erst Baum-Marker (Inventur-Info), dann Standpunkt-Marker (springen)
      const th = ray.intersectObjects(treeGroup.children, false)[0];
      if (th) { showTree(th.object.userData.t, e.clientX, e.clientY); return; }
      const hit = ray.intersectObjects(markerGroup.children, false)[0];
      if (hit) goTo(hit.object.userData.i);
      else document.getElementById('treeinfo').style.display = 'none';
    });

    // --- Baum-Info-Popup ---
    function showTree(t, px, py) {
      const el = document.getElementById('treeinfo');
      const row = (k, v, u) => v == null ? '' : `<tr><td>${k}</td><td><b>${v}</b> ${u||''}</td></tr>`;
      el.innerHTML = `<div style="margin-bottom:4px"><b>${t.id}</b></div><table>`
        + row('BHD', t.BHD_cm, 'cm')
        + row('Höhe', t.Hoehe_m, 'm')
        + row('Grundfläche', t.Grundflaeche_m2, 'm²')
        + row('Volumen', t.Volumen_m3, 'm³')
        + row('Schlankheit h/d', t.Schlankheit_hd, '')
        + row('Fit-RMS', t.Fit_RMS_cm, 'cm')
        + `</table>`;
      el.style.display = 'block';
      el.style.left = Math.min(px + 14, innerWidth - 180) + 'px';
      el.style.top = Math.min(py + 6, innerHeight - 160) + 'px';
    }

    function resize() { const w = canvas.clientWidth||innerWidth, h = canvas.clientHeight||innerHeight;
      renderer.setSize(w, h, false); camera.aspect = w/h; camera.updateProjectionMatrix(); }
    addEventListener('resize', resize);

    document.getElementById('size').addEventListener('input', e => material.size = e.target.value/1000);
    document.getElementById('tpts').addEventListener('change', e => cloudGroup.visible = e.target.checked);
    document.getElementById('tpano').addEventListener('change', e => sky.visible = e.target.checked);
    document.getElementById('ttrees').addEventListener('change', e => treeGroup.visible = e.target.checked);

    // --- Szene laden ---
    const cloudGroup = new THREE.Group(); scene.add(cloudGroup);
    let nodes = [], texCache = {}, active = -1;
    const posEl = document.getElementById('pos'), curEl = document.getElementById('curnode');

    async function loadPoints(rel) {
      const buf = await (await fetch('./data/' + rel)).arrayBuffer();
      const dv = new DataView(buf);
      if (String.fromCharCode(dv.getUint8(0),dv.getUint8(1),dv.getUint8(2),dv.getUint8(3)) !== 'PCB1')
        throw new Error('bad points ' + rel);
      const n = dv.getUint32(4, true);
      const positions = new Float32Array(buf, 8, n*3);
      const cU8 = new Uint8Array(buf, 8 + n*12, n*3);
      const colors = new Float32Array(n*3);
      for (let i=0;i<colors.length;i++) colors[i]=cU8[i]/255;
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(positions,3));
      g.setAttribute('color', new THREE.BufferAttribute(colors,3));
      return new THREE.Points(g, material);
    }
    function loadTex(rel) {
      if (texCache[rel]) return Promise.resolve(texCache[rel]);
      return new Promise((res,rej)=> new THREE.TextureLoader().load('./data/'+rel, t=>{
        t.colorSpace = THREE.SRGBColorSpace; t.wrapS = THREE.RepeatWrapping; texCache[rel]=t; res(t);
      }, undefined, rej));
    }

    let glideTo = null, glideT = 0;
    function goTo(i) {
      if (i === active || !nodes[i]) return;
      active = i; const nd = nodes[i];
      loadTex(nd.pano).then(t => { skyMat.uniforms.pano.value = t; });
      sky.position.set(nd.pos[0], nd.pos[1], nd.pos[2]);
      glideTo = new THREE.Vector3(nd.pos[0], nd.pos[1], nd.pos[2]); glideT = 0;
      curEl.textContent = nd.name;
      [...document.querySelectorAll('#nodes button')].forEach((b,bi)=> b.classList.toggle('active', bi===i));
      markerGroup.children.forEach(m => m.visible = (m.userData.i !== i));
    }

    async function boot() {
      const manifest = await (await fetch('./data/renon_scene.json')).json();
      nodes = manifest.nodes;
      // Punktwolken aller Standpunkte (gemeinsamer Frame) laden
      for (const nd of nodes) { const pts = await loadPoints(nd.points); cloudGroup.add(pts); }
      // Marker + Buttons
      const nb = document.getElementById('nodes');
      nodes.forEach((nd, i) => {
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 12),
          new THREE.MeshBasicMaterial({ color: 0x2ea3ff, transparent: true, opacity: 0.82 }));
        m.position.set(nd.pos[0], nd.pos[1], nd.pos[2]); m.userData.i = i;
        markerGroup.add(m);
        const b = document.createElement('button'); b.textContent = nd.id;
        b.onclick = () => goTo(i); nb.appendChild(b);
      });

      // --- Inventur: Baum-Marker + Bestandeswerte ---
      try {
        const inv = await (await fetch('./data/renon_stand.json')).json();
        buildTrees(inv.trees);
        buildStandPanel(inv.stand);
      } catch (e) { console.warn('Inventur nicht geladen:', e); }

      document.getElementById('status').remove();
      window.__three = { THREE, scene, camera, renderer, nodes, goTo,
                         look:()=>({yaw,pitch}), setLook:(y,p)=>{yaw=y;pitch=p;} };
      camera.position.set(nodes[0].pos[0], nodes[0].pos[1], nodes[0].pos[2]);
      goTo(0);
      window.__ready = { nodes: nodes.length };
    }

    // BHD -> Farbe (dünn = gelb, dick = grün) und Kugelradius
    function bhdColor(bhd) {
      const t = Math.min(1, Math.max(0, (bhd - 8) / 52));   // 8..60 cm
      return new THREE.Color().setHSL(0.12 + 0.28 * t, 0.75, 0.55);
    }
    function buildTrees(trees) {
      const geo = new THREE.SphereGeometry(1, 12, 10);
      for (const t of trees) {
        const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
          color: bhdColor(t.BHD_cm), transparent: true, opacity: 0.9 }));
        const rad = 0.10 + t.BHD_cm / 400;                   // sichtbar, ~ BHD
        m.scale.setScalar(rad);
        m.position.set(t.world[0], t.world[1], t.world[2]);
        m.userData.t = t;
        treeGroup.add(m);
      }
    }
    function buildStandPanel(st) {
      const q = st.quantitativ, ql = st.qualitativ, v = st.bhd_verteilung;
      const r = (k, val, u) => val == null ? '' :
        `<tr><td>${k}</td><td>${val} ${u || ''}</td></tr>`;
      const maxc = Math.max(...v.anzahl, 1);
      const bars = v.anzahl.map((c, i) =>
        `<div class="bar" style="height:${Math.round(100 * c / maxc)}%" title="${v.kanten_cm[i]}-${v.kanten_cm[i]+10} cm: ${c}"><span>${v.kanten_cm[i]}</span></div>`).join('');
      document.getElementById('stand').innerHTML = `
        <h3>Bestandeswerte</h3>
        <div class="sub">${st.n_standpunkte} TLS-Standpunkte · Plot r=${st.plot_radius_m} m (${(st.plot_area_ha*10000).toFixed(0)} m²) · aus LiDAR berechnet</div>
        <table>
          <tr><td class="grp" colspan="2">Dichte & Grundfläche</td></tr>
          ${r('Stammzahl', q.Stammzahl_N + ' (' + q.Stammzahl_N_ha, '/ha)')}
          ${r('Grundfläche G', q.Grundflaeche_m2_ha, 'm²/ha')}
          ${r('SDI (Reineke)', q.SDI_Reineke, '')}
          <tr><td class="grp" colspan="2">Dimension</td></tr>
          ${r('Dg (Kreisflächenmittel)', q.Dg_cm, 'cm')}
          ${r('BHD arithm. Mittel', q.BHD_mittel_cm, 'cm')}
          ${r('BHD-Spanne', q.BHD_min_cm + '–' + q.BHD_max_cm, 'cm')}
          ${r('Mittelhöhe', q.Hoehe_mittel_m, 'm')}
          ${r('Oberhöhe h100', q.Oberhoehe_h100_m, 'm')}
          ${r('Schlankheit h/d', q.Schlankheit_hd_mittel, '')}
          <tr><td class="grp" colspan="2">Vorrat</td></tr>
          ${r('Volumen', q.Vorrat_m3_ha, 'm³/ha')}
        </table>
        <div class="grp" style="padding-top:10px">BHD-Verteilung (cm)</div>
        <div id="hist">${bars}</div>
        <div class="qual"><b style="color:#7ee787">Art:</b> ${ql.Baumart}<br>
          <b style="color:#7ee787">Struktur:</b> ${ql.Struktur}<br>
          <b style="color:#7ee787">Erfassung:</b> ${ql.Vollstaendigkeit}</div>
        <div class="foot">${st.methodik}</div>`;
    }

    const _d = new THREE.Vector3(), _r = new THREE.Vector3();
    let last = performance.now();
    function tick() {
      const now = performance.now(), dt = Math.min(0.05,(now-last)/1000); last = now;
      const sp = (key['ShiftLeft']||key['ShiftRight'] ? 20 : 6) * dt;
      camera.getWorldDirection(_d); _r.crossVectors(_d, camera.up).normalize();
      if (key['KeyW']) camera.position.addScaledVector(_d, sp);
      if (key['KeyS']) camera.position.addScaledVector(_d, -sp);
      if (key['KeyD']) camera.position.addScaledVector(_r, sp);
      if (key['KeyA']) camera.position.addScaledVector(_r, -sp);
      if (key['Space']) camera.position.y += sp;
      if (key['ControlLeft']) camera.position.y -= sp;
      // sanftes Gleiten zum angeklickten Standpunkt
      if (glideTo) { glideT += dt*2.2; const a = Math.min(1, glideT);
        camera.position.lerp(glideTo, a*0.25); if (a>=1 && camera.position.distanceTo(glideTo)<0.05) glideTo=null; }
      camera.rotation.set(pitch, yaw, 0);
      const p = camera.position; posEl.textContent = `${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    resize(); boot().catch(e => { const s=document.getElementById('status');
      if (s){ s.textContent='Fehler: '+e.message; s.style.color='#ff8080'; } window.__ready={error:e.message}; });
    tick();
  </script>
</body>
</html>
