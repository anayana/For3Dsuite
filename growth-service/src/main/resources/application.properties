# Aktive Wachstums-Engine: stub (Default, ohne GPL-JAR) | treegross (echte Engine)
growth.engine=stub

# Modell-/Artparametersatz der echten Engine (nur bei growth.engine=treegross).
# WICHTIG: ein Modell mit voll qualifizierten Plugin-Namen waehlen -- die aeltere
# ForestSimulatorNWGermany.xml nennt "Competition" statt "treegross.base.Competition"
# und scheitert beim Laden mit ClassNotFoundException.
growth.treegross.model=lib/src/treegross/model/ForestSimulatorNWGermany6.xml

# Natuerliche Verjuengung im Wachstumsschritt beruecksichtigen
growth.treegross.natural-ingrowth=false

# Port des Dienstes (die Suite spricht ihn nur ueber HTTP/JSON an)
server.port=8362

spring.application.name=growth-service
